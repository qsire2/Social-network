{% extends 'network/base.html' %}

{% block title %}Реєстрація - SocialNet{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm">
            <h3 class="text-center fw-bold mb-4">Створити акаунт</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 fw-bold">Зареєструватися</button>
            </form>
            <hr>
            <p class="text-center mb-0">Вже маєте акаунт? <a href="{% url 'login' %}">Увійдіть тут</a></p>
        </div>
    </div>
</div>
{% endblock %}
