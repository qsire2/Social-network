{% extends 'network/base.html' %}

{% block title %}Налаштування профілю{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="bg-primary" style="height: 80px;"></div>

            <div class="card-body px-4 text-center" style="margin-top: -50px;">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="position-relative d-inline-block mb-4">
                        <div id="avatar-container" style="cursor: pointer;" title="Натисніть, щоб змінити фото">
                            {% if user.profile.avatar %}
                                <img src="{{ user.profile.avatar.url }}" id="avatar-preview" class="rounded-circle border border-4 border-white shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">
                            {% else %}
                                <div id="avatar-placeholder" class="bg-secondary text-white rounded-circle border border-4 border-white d-flex align-items-center justify-content-center shadow-sm" style="width: 120px; height: 120px; font-size: 40px; font-weight: bold;">
                                    {{ user.username|first|upper }}
                                </div>
                            {% endif %}
                            <div class="position-absolute bottom-0 end-0 bg-white rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                                📷
                            </div>
                        </div>
                        <input type="file" name="avatar" id="id_avatar" class="d-none" accept="image/*">
                    </div>

                    <h4 class="fw-bold mb-1">{{ user.username }}</h4>
                    <p class="text-muted small mb-4">Натисніть на фото, щоб завантажити нове</p>

                    <div class="text-start mb-4">
                        <label for="id_bio" class="form-label fw-bold small text-secondary px-2">Про себе</label>
                        <textarea name="bio" id="id_bio" class="form-control rounded-4 border-light bg-light p-3" rows="3" placeholder="Розкажіть про себе...">{{ user.profile.bio }}</textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                            Зберегти зміни
                        </button>
                        <a href="{% url 'profile' user.username %}" class="btn btn-link text-decoration-none text-muted small">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Робимо аватарку клікабельною
    const avatarContainer = document.getElementById('avatar-container');
    const fileInput = document.getElementById('id_avatar');
    const preview = document.getElementById('avatar-preview');
    const placeholder = document.getElementById('avatar-placeholder');

    avatarContainer.addEventListener('click', () => {
        fileInput.click();
    });

    // Попередній перегляд при виборі файлу
    fileInput.onchange = function (evt) {
        const [file] = fileInput.files;
        if (file) {
            const url = URL.createObjectURL(file);
            if (preview) {
                preview.src = url;
            } else if (placeholder) {
                // Якщо була буква, міняємо на картинку
                placeholder.innerHTML = `<img src="${url}" id="avatar-preview" class="rounded-circle border border-4 border-white shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">`;
            }
        }
    }
</script>

<style>
    textarea:focus {
        background-color: #fff !important;
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1) !important;
    }
</style>
{% endblock %}
